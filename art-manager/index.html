<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEMPAI - Art Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blob blob-red"></div>
    <div class="bg-blob blob-white"></div>

    <div id="loginScreen" class="login-screen glass-panel">
        <div class="login-box">
            <h2>Вход в систему</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn" class="btn-primary">Войти</button>
            <p id="loginError" class="error-text"></p>
        </div>
    </div>

    <div id="mobileOverlay" class="mobile-overlay"></div>

    <div class="app-container" id="appContent" style="display: none;">
        
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="logo">
                <h1>SEMPAI<span>.art</span></h1>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>
            <div class="filters">
                <h3>Категории</h3>
                <ul id="categoryList"></ul>
            </div>
            <button id="logoutBtn" class="btn-logout" style="margin-top:20px; width:100%;">Выйти</button>
        </aside>

        <main class="main-content">
            <header class="top-bar glass-panel">
                <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
                <div class="group-toggles" id="groupToggles"></div>
            </header>
            <div class="products-grid" id="productsGrid"></div>
        </main>
    </div>

    <div id="productModal" class="modal-overlay-product" style="display: none;">
        <div class="modal-box glass-panel modal-large">
            <button id="closeModalBtn" class="close-btn">&times;</button>
            
            <div class="modal-split">
                <div class="modal-info">
                    <div class="modal-img-wrapper">
                        <img id="modalImg" src="" alt="">
                    </div>
                    <h3 id="modalTitle" class="modal-title"></h3>
                    <p id="modalCategory" class="modal-category"></p>
                </div>

                <div class="modal-arts">
                    <h3 class="arts-title">Управление артами</h3>
                    
                    <div class="art-block black-art-block">
                        <div class="art-block-header">
                            <span class="color-dot dot-black"></span>
                            <h4>Черная футболка</h4>
                        </div>
                        <div class="input-group">
                            <input type="text" id="linkBlack" placeholder="Ссылка Google Диск...">
                            <input type="file" id="fileBlack" accept="image/*,.pdf,.cdr,.ai">
                        </div>
                        <div class="modal-actions">
                            <button id="saveBlackBtn" class="btn-variant btn-black">Сохранить</button>
                            <a id="viewBlackBtn" target="_blank" class="btn-variant btn-black" style="display:none;">Открыть арт</a>
                            <button id="delBlackBtn" class="btn-delete" style="display:none;">Удалить</button>
                        </div>
                    </div>

                    <div class="art-block white-art-block">
                        <div class="art-block-header">
                            <span class="color-dot dot-white"></span>
                            <h4>Белая футболка</h4>
                        </div>
                        <div class="input-group">
                            <input type="text" id="linkWhite" placeholder="Ссылка Google Диск...">
                            <input type="file" id="fileWhite" accept="image/*,.pdf,.cdr,.ai">
                        </div>
                        <div class="modal-actions">
                            <button id="saveWhiteBtn" class="btn-variant btn-white">Сохранить</button>
                            <a id="viewWhiteBtn" target="_blank" class="btn-variant btn-white" style="display:none;">Открыть арт</a>
                            <button id="delWhiteBtn" class="btn-delete" style="display:none;">Удалить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
