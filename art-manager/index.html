<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMPAI - Art Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blob blob-red"></div>
    <div class="bg-blob blob-white"></div>

    <div id="loginScreen" class="login-screen glass-panel">
        <div class="login-box">
            <h2>Вход в систему</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn" class="btn-primary">Войти</button>
            <p id="loginError" class="error-text"></p>
        </div>
    </div>

    <div class="app-container" id="appContent" style="display: none;">
        <aside class="sidebar glass-panel">
            <div class="logo">
                <h1>SEMPAI<span>.art</span></h1>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по названию...">
            </div>
            <div class="filters">
                <h3>Категории</h3>
                <ul id="categoryList"></ul>
            </div>
            <button id="logoutBtn" class="btn-logout" style="margin-top:20px; width:100%;">Выйти</button>
        </aside>

        <main class="main-content">
            <header class="top-bar glass-panel">
                <div class="group-toggles" id="groupToggles"></div>
            </header>
            <div class="products-grid" id="productsGrid"></div>
        </main>
    </div>

    <div id="artModal" class="modal-overlay" style="display: none;">
        <div class="modal-box glass-panel">
            <h3>Управление Артом</h3>
            <p id="modalProductName" style="margin-bottom: 15px; color: var(--text-muted);"></p>
            
            <div class="input-group">
                <label>1. Вставить ссылку (Гугл Диск):</label>
                <input type="text" id="artLinkInput" placeholder="https://drive.google.com/...">
            </div>
            
            <div style="text-align: center; margin: 15px 0;">— ИЛИ —</div>

            <div class="input-group">
                <label>2. Загрузить файл с компьютера:</label>
                <input type="file" id="artFileInput" accept="image/*,.pdf,.cdr,.ai">
            </div>

            <div class="modal-actions">
                <button id="closeModalBtn" class="btn-secondary">Отмена</button>
                <button id="saveArtBtn" class="btn-primary">Сохранить арт</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
