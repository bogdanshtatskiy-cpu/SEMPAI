<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>База дизайнов вышивки</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div id="auth-screen" class="glass-panel auth-panel">
        <i class="ph-fill ph-cat" style="font-size: 4rem; color: var(--hk-hot-pink);"></i>
        <h2>Вход в хранилище</h2>
        <p style="font-size: 0.8rem; margin-bottom: 15px; opacity: 0.7;">Только для администратора</p>
        <input type="password" id="secret-password" placeholder="Введите ключ доступа">
        <button onclick="checkPassword()" class="btn-rainbow full-width">Войти</button>
    </div>

    <div id="app-container" style="display: none;">
        <header class="glass-header">
            <div class="header-text">
                <h1>Мои Принты <i class="ph-fill ph-rainbow"></i></h1>
                <span class="subtitle">База для Janome 550e LE</span>
            </div>
            <div class="header-actions">
                <button class="btn-primary" onclick="openAddModal()"><i class="ph ph-plus"></i> Дизайн</button>
                <button class="btn-secondary" onclick="openStashModal()" title="Склад нитей"><i class="ph ph-yarn"></i> Склад</button>
                <button class="btn-icon" onclick="toggleTheme()" title="Сменить тему"><i class="ph ph-moon" id="theme-icon"></i></button>
                <button class="btn-icon" onclick="logout()" title="Выйти"><i class="ph ph-sign-out"></i></button>
            </div>
        </header>

        <main id="prints-grid" class="grid-container"></main>
    </div>

    <div id="stash-modal" class="modal-overlay">
        <div class="modal-content glass-panel" style="max-width: 600px;">
            <button class="close-btn" onclick="closeModal('stash-modal')"><i class="ph ph-x"></i></button>
            <h2 style="margin-bottom: 20px;"><i class="ph-fill ph-yarn" style="color: var(--hk-hot-pink);"></i> Склад нитей</h2>
            
            <div class="color-picker-controls glass-panel-inner" style="display: grid; grid-template-columns: 46px 1fr auto; gap: 10px; align-items: center; margin-bottom: 20px;">
                <input type="color" id="stash-color-picker" value="#ffb6c1">
                <input type="text" id="stash-color-code" placeholder="Код нити (Madeira 1001)" style="margin-bottom: 0;">
                <button class="btn-primary" onclick="addThreadToStash()"><i class="ph ph-plus"></i></button>
            </div>

            <div id="stash-loading" style="text-align: center; display: none;"><i class="ph ph-spinner ph-spin" style="font-size: 2rem; color: var(--hk-hot-pink);"></i></div>
            <div id="stash-list" class="colors-tags-container">
                </div>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="close-btn" onclick="closeModal('add-modal')"><i class="ph ph-x"></i></button>
            
            <div class="modal-header">
                <h2 id="modal-title" style="text-align: center;">Новый дизайн вышивки</h2>
                <div class="janome-info glass-panel-inner" style="margin-bottom: 25px;">
                    <i class="ph ph-info"></i> 
                    <small>Загружайте файлы <b>.jef</b>. Машина 550e.</small>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 25px; padding: 0 10px;">
                <label>Обложка дизайна</label>
                <label class="custom-file-upload full-width">
                    <input type="file" id="cover-image" accept="image/*" onchange="updateFileName(this)">
                    <span class="file-name" id="cover-file-name" style="text-align: center; width: 100%;"><i class="ph ph-image"></i> Выберите изображение...</span>
                </label>
            </div>

            <div class="form-group" style="margin-bottom: 25px; padding: 0 10px;">
                <label>Файлы .jef</label>
                <div id="files-container" class="files-grid-container" style="margin-bottom: 12px;"></div>
                <button class="btn-secondary" onclick="addJefRow()" style="text-align: center; width: 100%;"><i class="ph ph-plus-circle"></i> Добавить размер</button>
            </div>

            <div class="form-group color-section" style="margin-bottom: 25px; padding: 0 10px;">
                <label>Палитра цветов (Кликай по фото для выбора)</label>
                <div class="eyedropper-box glass-panel-inner">
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <label class="custom-file-upload" style="flex: 1;">
                            <input type="file" id="photo-for-color" accept="image/*" onchange="updateFileName(this)">
                            <span class="file-name"><i class="ph ph-camera"></i> Загрузить фото ниток...</span>
                        </label>
                        <button class="btn-primary" onclick="autoDetectColors()" title="Умное автоопределение"><i class="ph ph-magic-wand"></i> Авто</button>
                    </div>

                    <div id="canvas-wrapper" style="position: relative; width: 100%; display: none; border-radius: 12px; overflow: hidden; margin-top: 10px;">
                        <canvas id="color-canvas" style="width: 100%; display: block; cursor: crosshair;"></canvas>
                        <div id="markers-container"></div>
                    </div>
                </div>
                
                <div class="color-picker-controls" style="margin-top: 15px; display: grid; grid-template-columns: 46px 1fr 1fr auto; gap: 10px; align-items: center;">
                    <input type="color" id="manual-color" value="#ffb6c1" title="Ручной выбор цвета">
                    <input type="text" id="color-code" placeholder="Код (напр. Madeira 1001)" style="margin-bottom: 0; text-align: center;">
                    
                    <select id="stash-select" style="margin-bottom: 0; height: 46px; font-size: 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-dark); text-align: center; text-align-last: center;">
                        <option value="">Выбрать из Склада...</option>
                        </select>

                    <button class="btn-primary" onclick="addDesignColor()" style="text-align: center;"><i class="ph ph-palette"></i> Добавить</button>
                </div>

                <div id="colors-container" class="colors-tags-container" style="margin-top: 20px;"></div>
            </div>

            <button class="btn-rainbow full-width" onclick="savePrint(event)" id="save-btn" style="margin-top: 20px; font-size: 1.1rem; padding: 15px; text-align: center;">Сохранить в базу</button>
        </div>
    </div>

    <div id="view-modal" class="modal-overlay">
        <div class="modal-content glass-panel view-modal-content">
            <button class="close-btn" onclick="closeModal('view-modal')"><i class="ph ph-x"></i></button>
            
            <div class="view-header-actions">
                <button class="btn-action edit" id="btn-edit-print" title="Редактировать"><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-action delete" id="btn-delete-print" title="Удалить"><i class="ph ph-trash"></i></button>
            </div>

            <img id="view-image" src="" class="view-cover-img">
            
            <div class="glass-panel-inner">
                <h3 style="margin-bottom: 10px; text-align: center;">Палитра нитей</h3>
                <div id="view-colors" class="colors-list-vertical" style="justify-content: center;"></div>
            </div>

            <div class="glass-panel-inner" style="margin-top: 15px;">
                <h3 style="margin-bottom: 10px; text-align: center;">Файлы для вышивки</h3>
                <div id="view-files" class="files-list-vertical" style="justify-content: center;"></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
