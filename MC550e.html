<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>База дизайнов вышивки</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div id="auth-screen" class="glass-panel auth-panel">
        <i class="ph-fill ph-cat" style="font-size: 4rem; color: var(--hk-hot-pink);"></i>
        <h2>Вход в хранилище</h2>
        <p style="font-size: 0.8rem; margin-bottom: 15px; opacity: 0.7;">Только для администратора</p>
        <input type="password" id="secret-password" placeholder="Введите ключ доступа">
        <button onclick="checkPassword()" class="btn-rainbow full-width">Войти</button>
    </div>

    <div id="joke-modal" class="modal-overlay">
        <div class="modal-content glass-panel" style="max-width: 320px; text-align: center; padding: 40px 20px;">
            <h2 style="margin-bottom: 25px; font-size: 1.8rem;">Сасал ?</h2>
            <button class="btn-primary full-width" onclick="confirmJoke()" style="font-size: 1.2rem; padding: 15px;">Да</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <header class="glass-header">
            <div class="header-text">
                <h1>Мои Принты <i class="ph-fill ph-rainbow"></i></h1>
                <span class="subtitle">База для Janome 550e LE</span>
            </div>
            <div class="header-actions">
                <button class="btn-primary" onclick="openAddModal()"><i class="ph ph-plus"></i> Добавить</button>
                <button class="btn-icon" onclick="toggleTheme()" title="Сменить тему"><i class="ph ph-moon" id="theme-icon"></i></button>
                <button class="btn-icon" onclick="logout()" title="Выйти"><i class="ph ph-sign-out"></i></button>
            </div>
        </header>

        <main id="prints-grid" class="grid-container"></main>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="close-btn" onclick="closeModal('add-modal')"><i class="ph ph-x"></i></button>
            
            <div class="modal-header">
                <h2 id="modal-title">Новый дизайн вышивки</h2>
                <div class="janome-info glass-panel-inner">
                    <i class="ph ph-info"></i> 
                    <small>Загружайте файлы <b>.jef</b>. Машина 550e.</small>
                </div>
            </div>
            
            <div class="form-group">
                <label>Обложка дизайна</label>
                <label class="custom-file-upload full-width">
                    <input type="file" id="cover-image" accept="image/*" onchange="updateFileName(this)">
                    <span class="file-name" id="cover-file-name"><i class="ph ph-image"></i> Выберите изображение...</span>
                </label>
            </div>

            <div class="form-group">
                <label>Файлы .jef</label>
                <div id="files-container" class="files-grid-container"></div>
                <button class="btn-secondary" onclick="addFileRow()"><i class="ph ph-plus-circle"></i> Добавить размер</button>
            </div>

            <div class="form-group color-section">
                <label>Палитра цветов нитей (Автоопределение)</label>
                <div class="eyedropper-box glass-panel-inner" id="detection-zone" style="position: relative;">
                    <p style="margin-bottom: 10px; font-size: 0.85rem;">1. Загрузите фото катушек:</p>
                    <label class="custom-file-upload full-width">
                        <input type="file" id="photo-for-color" accept="image/*" onchange="updateFileName(this)">
                        <span class="file-name"><i class="ph ph-camera"></i> Выбрать фото катушек...</span>
                    </label>
                    <div id="markers-container" style="position: absolute; inset: 0; pointer-events: none;"></div>
                    <canvas id="color-canvas" style="display:none; max-width: 100%; border-radius: 12px; margin-top: 10px;"></canvas>
                </div>
                
                <div class="color-picker-controls" style="margin-top: 15px; display: grid; grid-template-columns: 46px 1fr auto; gap: 10px; align-items: center;">
                    <input type="color" id="manual-color" value="#ffb6c1" title="Ручной выбор цвета">
                    <input type="text" id="color-code" placeholder="Код нити (напр. Madeira 1001)" style="margin-bottom: 0;">
                    <button class="btn-primary" onclick="addColor()"><i class="ph ph-palette"></i> Добавить</button>
                </div>

                <div id="colors-container" class="colors-tags-container"></div>
            </div>

            <button class="btn-rainbow full-width" onclick="savePrint(event)" id="save-btn" style="margin-top: 20px; font-size: 1.1rem; padding: 15px;">Сохранить в базу</button>
        </div>
    </div>

    <div id="view-modal" class="modal-overlay">
        <div class="modal-content glass-panel view-modal-content">
            <button class="close-btn" onclick="closeModal('view-modal')"><i class="ph ph-x"></i></button>
            
            <div class="view-header-actions">
                <button class="btn-action edit" id="btn-edit-print" title="Редактировать"><i class="ph ph-pencil-simple"></i></button>
                <button class="btn-action delete" id="btn-delete-print" title="Удалить"><i class="ph ph-trash"></i></button>
            </div>

            <img id="view-image" src="" class="view-cover-img">
            
            <div class="glass-panel-inner">
                <h3 style="margin-bottom: 10px;">Палитра нитей</h3>
                <div id="view-colors" class="colors-list-vertical"></div>
            </div>

            <div class="glass-panel-inner" style="margin-top: 15px;">
                <h3 style="margin-bottom: 10px;">Файлы для вышивки</h3>
                <div id="view-files" class="files-list-vertical"></div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
